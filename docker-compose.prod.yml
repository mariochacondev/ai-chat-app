services:
  backend:
    build:
      context: ./backend
      target: prod
    env_file:
      - ./backend/.env.prod
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: prod
    env_file:
      - ./frontend/.env.production
    ports: ["80:80"]
    depends_on: [backend]