services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./backend/.env.dev
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./frontend/.env.development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: ["5173:5173"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on: [backend]